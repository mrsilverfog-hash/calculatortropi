plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}
version = '1.0.0'
group = 'net.tropimon'
archivesBaseName = 'calculatortropi'
repositories {
    maven { url 'https://maven.fabricmc.net/' }
    maven { url 'https://maven.impactdev.net/repository/development/' }
    maven { name = 'Cobblemon'; url = 'https://maven.cobblemon.net/releases' }
}
dependencies {
    minecraft 'com.mojang:minecraft:1.21.1'
    mappings 'net.fabricmc:yarn:1.21.1+build.3:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.16.5'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1'
    modCompileOnly('com.cobblemon:fabric:1.7.2+1.21.1') { transitive = true }
    compileOnly 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
}
processResources {
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}
tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.register('inspectCobblemon') {
    doLast {
        def tempDir = new File(buildDir, 'cobblemon-inspect')
        tempDir.deleteDir()
        tempDir.mkdirs()

        def artefacts = configurations.compileClasspath.resolvedConfiguration.resolvedArtifacts

        def afficherClasse = { File jarFile, String cheminClasse, String etiquette ->
            def dossierExtrait = new File(tempDir, etiquette)
            dossierExtrait.mkdirs()
            copy {
                from zipTree(jarFile)
                into dossierExtrait
                include cheminClasse
            }
            def fichier = new File(dossierExtrait, cheminClasse)
            println "==================== ${etiquette} : ${cheminClasse} ===================="
            if (fichier.exists()) {
                exec { commandLine 'javap', '-p', fichier.absolutePath }
            } else {
                println "NON TROUVE"
            }
        }

        def jarMinecraft = artefacts.find { it.file.name.contains('minecraft-merged') }?.file
        if (jarMinecraft != null) {
            println "JAR MINECRAFT: ${jarMinecraft.name}"
            afficherClasse(jarMinecraft, 'net/minecraft/client/Mouse.class', 'minecraft')
            afficherClasse(jarMinecraft, 'net/minecraft/client/util/Window.class', 'minecraft')
        } else {
            println "JAR MINECRAFT NON TROUVE"
        }
    }
}
