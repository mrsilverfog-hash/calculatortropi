plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}
version = '1.0.0'
group = 'net.tropimon'
archivesBaseName = 'calculatortropi'
repositories {
    maven { url 'https://maven.fabricmc.net/' }
    maven { url 'https://maven.impactdev.net/repository/development/' }
    maven { name = 'Cobblemon'; url = 'https://maven.cobblemon.net/releases' }
}
dependencies {
    minecraft 'com.mojang:minecraft:1.21.1'
    mappings 'net.fabricmc:yarn:1.21.1+build.3:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.16.5'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1'
    modCompileOnly('com.cobblemon:fabric:1.7.2+1.21.1') { transitive = true }
    compileOnly 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
}
processResources {
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}
tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.register('inspectCobblemon') {
    doLast {
        def cobblemonArtifact = configurations.compileClasspath.resolvedConfiguration.resolvedArtifacts.find {
            it.moduleVersion.id.group.contains('cobblemon') || it.file.name.startsWith('fabric-1.7.2')
        }

        if (cobblemonArtifact == null) {
            println "AUCUN ARTEFACT COBBLEMON TROUVE"
            return
        }

        def jarFile = cobblemonArtifact.file
        println "JAR COBBLEMON TROUVE: ${jarFile}"

        def tempDir = new File(buildDir, 'cobblemon-inspect')
        tempDir.deleteDir()
        tempDir.mkdirs()

        copy {
            from zipTree(jarFile)
            into tempDir
            include 'com/cobblemon/mod/common/client/storage/ClientStorageManager.class'
            include 'com/cobblemon/mod/common/client/storage/ClientParty.class'
            include 'com/cobblemon/mod/common/client/CobblemonClient.class'
            include 'com/cobblemon/mod/common/pokemon/Pokemon.class'
            include 'com/cobblemon/mod/common/pokemon/Species.class'
            include 'com/cobblemon/mod/common/pokemon/Nature.class'
            include 'com/cobblemon/mod/common/api/abilities/Ability.class'
            include 'com/cobblemon/mod/common/api/types/ElementalType.class'
        }

        def imprimer = { String chemin, String nomClasse, List<String> motsCles ->
            def fichierClasse = new File(tempDir, chemin)
            if (!fichierClasse.exists()) {
                println "CLASSE NON TROUVEE DANS LE JAR: ${nomClasse}"
                return
            }
            def sortie = new ByteArrayOutputStream()
            exec {
                commandLine 'javap', '-p', fichierClasse.absolutePath
                standardOutput = sortie
            }
            println "==================== ${nomClasse} ===================="
            sortie.toString().eachLine { ligne ->
                if (motsCles.isEmpty() || motsCles.any { mot -> ligne.toLowerCase().contains(mot) }) {
                    println ligne
                }
            }
        }

        imprimer('com/cobblemon/mod/common/client/storage/ClientStorageManager.class', 'ClientStorageManager', [])
        imprimer('com/cobblemon/mod/common/client/storage/ClientParty.class', 'ClientParty', [])
        imprimer('com/cobblemon/mod/common/client/CobblemonClient.class', 'CobblemonClient', [])
        imprimer('com/cobblemon/mod/common/pokemon/Pokemon.class', 'Pokemon (filtré)', [
            'species', 'level', 'nature', 'ability', 'currenthealth', 'maxhealth',
            'attack', 'defence', 'speed', 'helditem'
        ])
        imprimer('com/cobblemon/mod/common/pokemon/Species.class', 'Species (filtré)', [
            'basestats', 'primarytype', 'secondarytype', 'getname', 'name('
        ])
        imprimer('com/cobblemon/mod/common/pokemon/Nature.class', 'Nature', [])
        imprimer('com/cobblemon/mod/common/api/abilities/Ability.class', 'Ability', [])
        imprimer('com/cobblemon/mod/common/api/types/ElementalType.class', 'ElementalType', [])
    }
}
