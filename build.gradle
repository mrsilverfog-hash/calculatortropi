plugins {
    id 'fabric-loom' version '1.7-SNAPSHOT'
    id 'maven-publish'
}
version = '1.0.0'
group = 'net.tropimon'
archivesBaseName = 'calculatortropi'
repositories {
    maven { url 'https://maven.fabricmc.net/' }
    maven { url 'https://maven.impactdev.net/repository/development/' }
    maven { name = 'Cobblemon'; url = 'https://maven.cobblemon.net/releases' }
}
dependencies {
    minecraft 'com.mojang:minecraft:1.21.1'
    mappings 'net.fabricmc:yarn:1.21.1+build.3:v2'
    modImplementation 'net.fabricmc:fabric-loader:0.16.5'
    modImplementation 'net.fabricmc.fabric-api:fabric-api:0.102.0+1.21.1'
    modCompileOnly('com.cobblemon:fabric:1.7.2+1.21.1') { transitive = true }
    compileOnly 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
}
processResources {
    inputs.property 'version', project.version
    filesMatching('fabric.mod.json') {
        expand 'version': project.version
    }
}
tasks.withType(JavaCompile).configureEach {
    it.options.release = 21
}
java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

tasks.register('inspectCobblemon') {
    doLast {
        def cobblemonArtifact = configurations.compileClasspath.resolvedConfiguration.resolvedArtifacts.find {
            it.moduleVersion.id.group.contains('cobblemon') || it.file.name.startsWith('fabric-1.7.2')
        }

        if (cobblemonArtifact == null) {
            println "AUCUN ARTEFACT COBBLEMON TROUVE"
            return
        }

        def jarFile = cobblemonArtifact.file
        println "JAR COBBLEMON TROUVE: ${jarFile}"

        def tempDir = new File(buildDir, 'cobblemon-inspect')
        tempDir.deleteDir()
        tempDir.mkdirs()

        copy {
            from zipTree(jarFile)
            into tempDir
            include 'com/cobblemon/mod/common/pokemon/Pokemon.class'
            include 'com/cobblemon/mod/common/api/moves/**'
            include 'com/cobblemon/mod/common/moves/**'
            include 'com/cobblemon/mod/common/api/pokemon/PokemonProperties.class'
        }

        println "==================== Pokemon.class (complet) ===================="
        def fichierPokemon = new File(tempDir, 'com/cobblemon/mod/common/pokemon/Pokemon.class')
        if (fichierPokemon.exists()) {
            exec { commandLine 'javap', '-p', fichierPokemon.absolutePath }
        } else {
            println "NON TROUVE"
        }

        ['com/cobblemon/mod/common/api/moves', 'com/cobblemon/mod/common/moves'].each { chemin ->
            def dossier = new File(tempDir, chemin)
            if (dossier.exists()) {
                dossier.eachFileRecurse { fichier ->
                    if (fichier.name.endsWith('.class') && !fichier.name.contains('$')) {
                        println "==================== ${fichier.name} ===================="
                        exec { commandLine 'javap', '-p', fichier.absolutePath }
                    }
                }
            } else {
                println "DOSSIER NON TROUVE: ${chemin}"
            }
        }

        println "==================== PokemonProperties.class ===================="
        def fichierProps = new File(tempDir, 'com/cobblemon/mod/common/api/pokemon/PokemonProperties.class')
        if (fichierProps.exists()) {
            exec { commandLine 'javap', '-p', fichierProps.absolutePath }
        } else {
            println "NON TROUVE"
        }
    }
}
